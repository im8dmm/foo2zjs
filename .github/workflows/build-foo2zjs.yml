name: Build foo2zjs for ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.4/targets/mediatek/filogic/openwrt-sdk-23.05.4-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          echo "正在解压 SDK..."
          tar -xf sdk.tar.xz
          SDK_DIR=$(tar -tf sdk.tar.xz | head -1 | cut -f1 -d"/")
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          rm sdk.tar.xz

      - name: Setup OpenWrt SDK environment
        run: |
          cd $SDK_DIR
          sed -i '/telephony/s/^/#/' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install cups ghostscript libjpeg-turbo libcups
          make defconfig

      - name: Create foo2zjs package
        run: |
          cd $SDK_DIR
          mkdir -p package/foo2zjs
          cat > package/foo2zjs/Makefile << 'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=foo2zjs
          PKG_VERSION:=20200505
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=https://github.com/koenkooi/foo2zjs.git
          PKG_SOURCE_VERSION:=e3bf2986f2a2f2287fa53947da1903dd9f0c9df4
          PKG_MIRROR_HASH:=skip

          PKG_LICENSE:=GPL-2.0
          PKG_LICENSE_FILES:=COPYING

          PKG_BUILD_PARALLEL:=1

          include $(INCLUDE_DIR)/package.mk

          define Package/foo2zjs
            SECTION:=utils
            CATEGORY:=Utilities
            TITLE:=A linux printer driver for ZjStream protocol
            URL:=https://github.com/koenkooi/foo2zjs
            DEPENDS:=+cups +libcups +ghostscript +libjpeg-turbo
          endef

          define Package/foo2zjs/description
            foo2zjs is an open source printer driver for printers that use the
            Zenographics ZjStream wire protocol, such as the HP LaserJet 1022n.
          endef

          define Build/Compile
            $(MAKE) -C $(PKG_BUILD_DIR) \
              CC="$(TARGET_CC)" \
              CXX="$(TARGET_CXX)" \
              CFLAGS="$(TARGET_CFLAGS) $(TARGET_CPPFLAGS)" \
              LDFLAGS="$(TARGET_LDFLAGS)" \
              all
          endef

          define Package/foo2zjs/install
            $(INSTALL_DIR) $(1)/usr/bin
            $(INSTALL_DIR) $(1)/usr/lib/cups/filter
            $(INSTALL_DIR) $(1)/usr/share/cups/model
            $(INSTALL_DIR) $(1)/usr/share/foo2zjs/firmware
            
            $(CP) $(PKG_BUILD_DIR)/foo2zjs $(1)/usr/bin/ 2>/dev/null || true
            $(CP) $(PKG_BUILD_DIR)/zjsdecode $(1)/usr/bin/ 2>/dev/null || true
            $(CP) $(PKG_BUILD_DIR)/usb_printerid $(1)/usr/bin/ 2>/dev/null || true
            $(CP) $(PKG_BUILD_DIR)/command2foo2lava-pjl $(1)/usr/bin/ 2>/dev/null || true
            
            $(CP) $(PKG_BUILD_DIR)/*tozjs $(1)/usr/lib/cups/filter/ 2>/dev/null || true
            $(CP) $(PKG_BUILD_DIR)/foo2zjs-wrapper $(1)/usr/lib/cups/filter/ 2>/dev/null || true
            
            if [ -d $(PKG_BUILD_DIR)/PPD ]; then \
              $(CP) $(PKG_BUILD_DIR)/PPD/*.ppd $(1)/usr/share/cups/model/ ; \
            fi
            
            cd $(PKG_BUILD_DIR) && ./getweb 1022 || true
            if [ -d $(PKG_BUILD_DIR)/firmware ]; then \
              $(INSTALL_DIR) $(1)/usr/share/foo2zjs/firmware ; \
              $(CP) $(PKG_BUILD_DIR)/firmware/* $(1)/usr/share/foo2zjs/firmware/ ; \
            fi
          endef

          $(eval $(call BuildPackage,foo2zjs))
          EOF

      - name: Compile foo2zjs
        run: |
          cd $SDK_DIR
          make package/foo2zjs/compile V=s

      - name: Collect artifacts
        run: |
          cd $SDK_DIR
          mkdir -p artifacts
          find bin -name "*.ipk" -exec cp {} artifacts/ \;
          echo "编译完成的软件包："
          ls -la artifacts/

      - name: Upload IPK files
        uses: actions/upload-artifact@v4
        with:
          name: foo2zjs-ipks
          path: ${{ env.SDK_DIR }}/artifacts/
          retention-days: 7
