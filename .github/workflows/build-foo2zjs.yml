name: Build foo2zjs for ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.4/targets/mediatek/filogic/openwrt-sdk-23.05.4-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          echo "正在解压 SDK..."
          tar -xf sdk.tar.xz
          SDK_DIR=$(tar -tf sdk.tar.xz | head -1 | cut -f1 -d"/")
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          rm sdk.tar.xz

      - name: Setup OpenWrt SDK environment
        run: |
          cd $SDK_DIR
          sed -i '/telephony/s/^/#/' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 安装编译所需依赖
          ./scripts/feeds install cups ghostscript libjpeg-turbo
          make defconfig

      - name: Create foo2zjs package with proper tabs
        run: |
          cd $SDK_DIR
          mkdir -p package/foo2zjs
          
          # 使用 printf 生成 Makefile，确保 Tab 字符正确
          printf 'include $(TOPDIR)/rules.mk\n\n' > package/foo2zjs/Makefile
          printf 'PKG_NAME:=foo2zjs\n' >> package/foo2zjs/Makefile
          printf 'PKG_VERSION:=20200505\n' >> package/foo2zjs/Makefile
          printf 'PKG_RELEASE:=1\n\n' >> package/foo2zjs/Makefile
          printf 'PKG_SOURCE_PROTO:=git\n' >> package/foo2zjs/Makefile
          printf 'PKG_SOURCE_URL:=https://github.com/koenkooi/foo2zjs.git\n' >> package/foo2zjs/Makefile
          printf 'PKG_SOURCE_VERSION:=e3bf2986f2a2f2287fa53947da1903dd9f0c9df4\n' >> package/foo2zjs/Makefile
          printf 'PKG_MIRROR_HASH:=skip\n\n' >> package/foo2zjs/Makefile
          printf 'PKG_LICENSE:=GPL-2.0\n' >> package/foo2zjs/Makefile
          printf 'PKG_LICENSE_FILES:=COPYING\n\n' >> package/foo2zjs/Makefile
          printf 'PKG_BUILD_PARALLEL:=1\n\n' >> package/foo2zjs/Makefile
          printf 'include $(INCLUDE_DIR)/package.mk\n\n' >> package/foo2zjs/Makefile
          
          printf 'define Package/foo2zjs\n' >> package/foo2zjs/Makefile
          printf '\tSECTION:=utils\n' >> package/foo2zjs/Makefile
          printf '\tCATEGORY:=Utilities\n' >> package/foo2zjs/Makefile
          printf '\tTITLE:=A linux printer driver for ZjStream protocol\n' >> package/foo2zjs/Makefile
          printf '\tURL:=https://github.com/koenkooi/foo2zjs\n' >> package/foo2zjs/Makefile
          printf '\tDEPENDS:=+cups +libcups +ghostscript +libjpeg-turbo\n' >> package/foo2zjs/Makefile
          printf 'endef\n\n' >> package/foo2zjs/Makefile
          
          printf 'define Package/foo2zjs/description\n' >> package/foo2zjs/Makefile
          printf '\tfoo2zjs is an open source printer driver for printers that use the\n' >> package/foo2zjs/Makefile
          printf '\tZenographics ZjStream wire protocol, such as the HP LaserJet 1022n.\n' >> package/foo2zjs/Makefile
          printf 'endef\n\n' >> package/foo2zjs/Makefile
          
          printf 'define Build/Compile\n' >> package/foo2zjs/Makefile
          printf '\t$(MAKE) -C $(PKG_BUILD_DIR) \\\n' >> package/foo2zjs/Makefile
          printf '\t\tCC="$(TARGET_CC)" \\\n' >> package/foo2zjs/Makefile
          printf '\t\tCXX="$(TARGET_CXX)" \\\n' >> package/foo2zjs/Makefile
          printf '\t\tCFLAGS="$(TARGET_CFLAGS) $(TARGET_CPPFLAGS)" \\\n' >> package/foo2zjs/Makefile
          printf '\t\tLDFLAGS="$(TARGET_LDFLAGS)" \\\n' >> package/foo2zjs/Makefile
          printf '\t\tall\n' >> package/foo2zjs/Makefile
          printf 'endef\n\n' >> package/foo2zjs/Makefile
          
          printf 'define Package/foo2zjs/install\n' >> package/foo2zjs/Makefile
          printf '\t$(INSTALL_DIR) $(1)/usr/bin\n' >> package/foo2zjs/Makefile
          printf '\t$(INSTALL_DIR) $(1)/usr/lib/cups/filter\n' >> package/foo2zjs/Makefile
          printf '\t$(INSTALL_DIR) $(1)/usr/share/cups/model\n' >> package/foo2zjs/Makefile
          printf '\t$(INSTALL_DIR) $(1)/usr/share/foo2zjs/firmware\n\n' >> package/foo2zjs/Makefile
          
          printf '\t$(CP) $(PKG_BUILD_DIR)/foo2zjs $(1)/usr/bin/ 2>/dev/null || true\n' >> package/foo2zjs/Makefile
          printf '\t$(CP) $(PKG_BUILD_DIR)/zjsdecode $(1)/usr/bin/ 2>/dev/null || true\n' >> package/foo2zjs/Makefile
          printf '\t$(CP) $(PKG_BUILD_DIR)/usb_printerid $(1)/usr/bin/ 2>/dev/null || true\n' >> package/foo2zjs/Makefile
          printf '\t$(CP) $(PKG_BUILD_DIR)/command2foo2lava-pjl $(1)/usr/bin/ 2>/dev/null || true\n\n' >> package/foo2zjs/Makefile
          
          printf '\t$(CP) $(PKG_BUILD_DIR)/*tozjs $(1)/usr/lib/cups/filter/ 2>/dev/null || true\n' >> package/foo2zjs/Makefile
          printf '\t$(CP) $(PKG_BUILD_DIR)/foo2zjs-wrapper $(1)/usr/lib/cups/filter/ 2>/dev/null || true\n\n' >> package/foo2zjs/Makefile
          
          printf '\tif [ -d $(PKG_BUILD_DIR)/PPD ]; then \\\n' >> package/foo2zjs/Makefile
          printf '\t\t$(CP) $(PKG_BUILD_DIR)/PPD/*.ppd $(1)/usr/share/cups/model/ ; \\\n' >> package/foo2zjs/Makefile
          printf '\tfi\n\n' >> package/foo2zjs/Makefile
          
          printf '\tcd $(PKG_BUILD_DIR) && ./getweb 1022 || true\n' >> package/foo2zjs/Makefile
          printf '\tif [ -d $(PKG_BUILD_DIR)/firmware ]; then \\\n' >> package/foo2zjs/Makefile
          printf '\t\t$(INSTALL_DIR) $(1)/usr/share/foo2zjs/firmware ; \\\n' >> package/foo2zjs/Makefile
          printf '\t\t$(CP) $(PKG_BUILD_DIR)/firmware/* $(1)/usr/share/foo2zjs/firmware/ ; \\\n' >> package/foo2zjs/Makefile
          printf '\tfi\n' >> package/foo2zjs/Makefile
          printf 'endef\n\n' >> package/foo2zjs/Makefile
          
          printf '$(eval $(call BuildPackage,foo2zjs))\n' >> package/foo2zjs/Makefile

      - name: Compile foo2zjs
        run: |
          cd $SDK_DIR
          make package/foo2zjs/compile V=s

      - name: Collect artifacts
        run: |
          cd $SDK_DIR
          mkdir -p artifacts
          find bin -name "*.ipk" -exec cp {} artifacts/ \;
          echo "编译完成的软件包："
          ls -la artifacts/

      - name: Upload IPK files
        uses: actions/upload-artifact@v4
        with:
          name: foo2zjs-ipks
          path: ${{ env.SDK_DIR }}/artifacts/
          retention-days: 7
