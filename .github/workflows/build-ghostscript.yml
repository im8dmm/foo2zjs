      - name: Setup OpenWrt SDK environment
        run: |
          cd $SDK_DIR
          # 配置 Git 以解决网络不稳定问题
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global core.compression 0
          
          # 注释掉用不到的 telephony feed
          sed -i '/telephony/s/^/#/' feeds.conf.default
          
          # 使用重试机制更新 feeds
          ./scripts/feeds update -a || (sleep 30 && ./scripts/feeds update -a)
          ./scripts/feeds install -a
          
          # 安装编译 ghostscript 所需的依赖
          ./scripts/feeds install libcups libjpeg-turbo libpng zlib freetype
          make defconfig
