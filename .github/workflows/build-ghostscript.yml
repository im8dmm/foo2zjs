name: Build ghostscript for ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.4/targets/mediatek/filogic/openwrt-sdk-23.05.4-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          echo "正在解压 SDK..."
          tar -xf sdk.tar.xz
          SDK_DIR=$(tar -tf sdk.tar.xz | head -1 | cut -f1 -d"/")
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          rm sdk.tar.xz

      - name: Setup OpenWrt SDK environment
        run: |
          cd $SDK_DIR

          # 优化 Git 配置，应对可能的网络波动
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global core.compression 0

          # 注释掉不稳定的 telephony feed
          sed -i '/telephony/s/^/#/' feeds.conf.default

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 安装 ghostscript 及其依赖（OpenWrt 官方包）
          ./scripts/feeds install ghostscript

          # 生成默认配置
          make defconfig

      - name: Compile ghostscript
        run: |
          cd $SDK_DIR
          # 编译 ghostscript 包
          make package/ghostscript/compile V=s

      - name: Collect artifacts
        run: |
          cd $SDK_DIR
          mkdir -p artifacts
          find bin -name "*.ipk" -exec cp {} artifacts/ \;
          echo "编译完成的软件包："
          ls -la artifacts/

      - name: Upload IPK files
        uses: actions/upload-artifact@v4
        with:
          name: ghostscript-ipks
          path: ${{ env.SDK_DIR }}/artifacts/
          retention-days: 7
